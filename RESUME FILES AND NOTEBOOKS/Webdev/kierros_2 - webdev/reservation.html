<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Book a cruise</title>
    </head>
    <form>
        <h1>Welcome to Best Cruises - Book a cruise<sup><small>TM</small></sup>!</h1>
        <label for="from-selection">From:</label><br>
        <select id="from-selection" name="from">
            <option value="Helsinki" id="from-helsinki">Helsinki</option>
            <option value="Turku" id="from-turku">Turku</option>
            <option value="Vaasa" id="from-vaasa">Vaasa</option>
            <option value="Tallinna" id="from-tallinna">Tallinna</option>
        </select><br>
        <label for="to-selection">To:</label><br>
        <select id="to-selection" name="to">
            <option value="Helsinki" id="to-helsinki">Helsinki</option>
            <option value="Turku" id="to-turku">Turku</option>
            <option value="Vaasa" id="to-vaasa">Vaasa</option>
            <option value="Tallinna" id="to-tallinna">Tallinna</option>
        </select><br>
        <label for="customer-name">Name:</label><br>
        <input type="text" id="customer-name" required><br>
        <label for="customer-email">Email:</label><br>
        <input type="email" id="customer-email" required><br>
        <label for="number-of-adults">Number of adults:</label><br>
        <input type="number" id="number-of-adults" min="1" max="99" required><br>
        <label for="number-of-children">Number of children:</label><br>
        <input type="number" id="number-of-children" min="0" max="99" required><br>
        <label for="departure-date">Departude date:</label><br>
        <input type="date" id="departure-date" required><br>
        <label for="vehicle">Travelling with a vehicle:</label><br>
        <input type="checkbox" id="vehicle">
        <input type="submit" value="Submit" id="submit">
    </form>
</html>
